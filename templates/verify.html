<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resuming verification — Lonely Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh;
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(circle at 20% 0%, #2a0d2e 0%, #0a0a14 55%, #050509 100%);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card {
    max-width:440px; width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    padding:36px 28px;
    text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
    backdrop-filter:blur(14px);
  }
  .spinner {
    width:46px; height:46px; border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
    border-top-color:#ef4444;
    margin:0 auto 18px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  h1 { font-size:20px; margin:0 0 8px; font-weight:800; }
  p { font-size:14px; color:rgba(255,255,255,.7); margin:6px 0; }
  .btn {
    display:inline-block; margin-top:18px;
    padding:12px 22px; border-radius:12px;
    background:linear-gradient(135deg,#ef4444,#7c3aed);
    color:#fff; font-weight:700; text-decoration:none;
    font-size:14px;
  }
  .btn.secondary {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
  }
  #fallback { display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1 id="title">Verification successful</h1>
  <p id="msg">Resuming your key generation…</p>
  <div id="fallback">
    <a class="btn" href="/getkey">Start over</a>
  </div>
</div>

<script>
(function(){
  const titleEl = document.getElementById('title');
  const msgEl = document.getElementById('msg');
  const fb = document.getElementById('fallback');

  const sidQ = {{ sid_q | tojson }};
  const stepQ = {{ step_q | tojson }};

  let sess = null;
  try { sess = JSON.parse(sessionStorage.getItem('lonely_session') || 'null'); } catch(e){}

  let sid = sidQ || (sess && sess.sid) || null;
  let total = sess && sess.total ? Number(sess.total) : null;
  let nextStep = stepQ ? Number(stepQ) : (sess && sess.nextStep ? Number(sess.nextStep) : null);

  if (!sid || !nextStep) {
    titleEl.textContent = 'Session not found';
    msgEl.textContent = 'We could not resume your verification. Please start a new key request.';
    fb.style.display = 'block';
    return;
  }

  let target;
  if (total !== null && nextStep > total) {
    target = '/getkey/finish/' + encodeURIComponent(sid);
  } else if (total !== null && total <= 1) {
    target = '/getkey/finish/' + encodeURIComponent(sid);
  } else {
    target = '/getkey/step/' + encodeURIComponent(sid) + '/' + nextStep;
  }

  setTimeout(function(){ window.location.replace(target); }, 700);
})();
</script>
</body>
</html>
